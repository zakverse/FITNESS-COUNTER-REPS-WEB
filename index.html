<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Fitness Pro - Multi-Model Assistant</title>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/posenet@2.2.1/dist/posenet.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>

    <style>
      :root {
        --bg-color: #0f172a;
        --card-bg: #1e293b;
        --accent-color: #22c55e; /* Hijau Neon */
        --text-main: #f8fafc;
        --text-dim: #94a3b8;
      }

      body {
        font-family: "Inter", sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        width: 100%;
        max-width: 450px;
        background: var(--card-bg);
        border-radius: 24px;
        padding: 2rem;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        text-align: center;
      }

      h1 {
        font-size: 1.5rem;
        margin-bottom: 1.5rem;
        color: var(--accent-color);
        letter-spacing: 1px;
      }

      .selection-box {
        margin-bottom: 20px;
      }

      select {
        width: 100%;
        padding: 12px;
        border-radius: 12px;
        background: #334155;
        color: white;
        border: 1px solid #475569;
        font-size: 1rem;
        outline: none;
      }

      .btn-start {
        width: 100%;
        background: var(--accent-color);
        color: #052e16;
        border: none;
        padding: 15px;
        border-radius: 12px;
        font-weight: bold;
        font-size: 1.1rem;
        margin-top: 10px;
        cursor: pointer;
        transition: 0.3s;
      }

      .btn-start:hover {
        transform: scale(1.02);
        filter: brightness(1.1);
      }

      #canvas-container {
        position: relative;
        width: 300px;
        height: 300px;
        margin: 20px auto;
        border-radius: 16px;
        overflow: hidden;
        border: 3px solid #334155;
        background: #000;
      }

      canvas {
        width: 100%;
        height: 100%;
      }

      .stat-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        margin-top: 20px;
      }

      .stat-card {
        background: #334155;
        padding: 15px;
        border-radius: 16px;
      }

      .stat-label {
        font-size: 0.7rem;
        color: var(--text-dim);
        text-transform: uppercase;
        margin-bottom: 5px;
      }
      .stat-value {
        font-size: 2rem;
        font-weight: bold;
        color: var(--accent-color);
      }

      #status-text {
        font-size: 0.9rem;
        color: var(--accent-color);
        margin: 10px 0;
        height: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>AI FITNESS PRO</h1>

      <div class="selection-box">
        <select id="exercise-select" onchange="resetCounter()">
          <option value="squat">SQUAT</option>
          <option value="pushup">PUSH-UP</option>
          <option value="lunge">LUNGE</option>
          <option value="situp">SIT-UP</option>
          <option value="jj">JUMPING JACK</option>
        </select>
        <button class="btn-start" onclick="init()">MULAI LATIHAN</button>
      </div>

      <div id="status-text">Siap untuk berkeringat?</div>

      <div id="canvas-container">
        <canvas id="canvas"></canvas>
      </div>

      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-label">Repetisi</div>
          <div id="rep-count" class="stat-value">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Akurasi AI</div>
          <div
            id="accuracy"
            class="stat-value"
            style="font-size: 1.2rem; margin-top: 10px"
          >
            0%
          </div>
        </div>
      </div>
    </div>

    <script>
      // 1. DAFTAR URL MODEL (MASUKKAN LINK ANDA DI SINI)
      const MODEL_URLS = {
        squat: "https://teachablemachine.withgoogle.com/models/_fec-xp2u/",
        pushup: "https://teachablemachine.withgoogle.com/models/ho-trLhwI/",
        lunge: "https://teachablemachine.withgoogle.com/models/lQEGyOvNo/",
        situp: "https://teachablemachine.withgoogle.com/models/uk8veRyZx/",
        jj: "https://teachablemachine.withgoogle.com/models/jZHgQNIHN/",
      };

      let model, webcam, ctx, maxPredictions;
      let counter = 0;
      let stage = "up"; // Status posisi: up atau down

      async function init() {
        try {
            const exercise = document.getElementById("exercise-select").value;
            const URL = MODEL_URLS[exercise];
            
            // 1. Load model dulu
            model = await tmPose.load(URL + "model.json", URL + "metadata.json");
            maxPredictions = model.getTotalClasses();

            // 2. Setup webcam setelah model siap
            const size = 300;
            const flip = true;
            webcam = new tmPose.Webcam(size, size, flip); 
            
            await webcam.setup(); // Tunggu izin user
            await webcam.play();  // Nyalakan stream
            
            // 3. Masuk ke loop
            window.requestAnimationFrame(loop);

            const canvas = document.getElementById("canvas");
            canvas.width = size; canvas.height = size;
            ctx = canvas.getContext("2d");
            
            document.getElementById("status-text").innerText = "Siap!";
        } catch (e) {
            console.error("Gagal inisialisasi:", e);
            document.getElementById("status-text").innerText = "Error: " + e.message;
        }
    }

      async function loop(timestamp) {
        webcam.update();
        await predict();
        window.requestAnimationFrame(loop);
      }

      async function predict() {
        const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
        const prediction = await model.predict(posenetOutput);

        // LOGIKA HITUNGAN REPETISI
        // Asumsi Class 0 = UP, Class 1 = DOWN (Sesuaikan dengan TM Anda)
        const probUp = prediction[0].probability;
        const probDown = prediction[1].probability;

        // Tampilkan akurasi tertinggi di layar
        const currentAcc = Math.max(probUp, probDown);
        document.getElementById("accuracy").innerText =
          (currentAcc * 100).toFixed(0) + "%";

        if (probDown > 0.9) {
          if (stage !== "down") {
            stage = "down";
            document.getElementById("status-text").innerText = "TURUN!";
          }
        } else if (probUp > 0.9) {
          if (stage === "down") {
            counter++;
            stage = "up";
            document.getElementById("rep-count").innerText = counter;
            document.getElementById("status-text").innerText = "BAGUS! LANJUT!";
            playNotificationSound();
          }
        }

        drawPose(pose);
      }

      function drawPose(pose) {
        if (webcam.canvas) {
          ctx.drawImage(webcam.canvas, 0, 0);
          if (pose) {
            const minPartConfidence = 0.5;
            tmPose.drawKeypoints(pose.keypoints, minPartConfidence, ctx);
            tmPose.drawSkeleton(pose.keypoints, minPartConfidence, ctx);
          }
        }
      }

      function resetCounter() {
        counter = 0;
        document.getElementById("rep-count").innerText = counter;
        document.getElementById("status-text").innerText =
          "Latihan diganti. Klik Mulai.";
        // Hentikan webcam jika sedang berjalan untuk menghemat RAM
        if (webcam) webcam.stop();
      }

      function playNotificationSound() {
        const audioCtx = new (
          window.AudioContext || window.webkitAudioContext
        )();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = "sine";
        osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
      }
    </script>
  </body>
</html>
